<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Belleza Tahiti — Portfolio PACIFIK'AI</title>
<meta name="description" content="Studio Belleza Tahiti — Système de prise de rendez-vous en ligne, chatbot IA, dashboard admin. Réalisé par PACIFIK'AI.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --mauve: #9B7DA0;
  --mauve-dark: #3D2840;
  --gold: #D4A853;
  --cream: #FAF7F2;
  --text: #2D2D2D;
}
body { font-family: 'DM Sans', sans-serif; background: #0a0a0a; color: #fff; overflow: hidden; height: 100vh; }

/* TOP BAR */
.showcase-bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 28px;
  background: rgba(10,10,10,0.92);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.bar-left { display: flex; align-items: center; gap: 16px; }
.bar-logo {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, var(--mauve), var(--gold));
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 16px; color: #fff;
}
.bar-info h2 { font-size: 14px; font-weight: 600; letter-spacing: 0.02em; }
.bar-info p { font-size: 11px; color: rgba(255,255,255,0.5); letter-spacing: 0.04em; }
.bar-tags { display: flex; gap: 8px; }
.tag {
  padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: 500;
  letter-spacing: 0.08em; text-transform: uppercase;
  background: rgba(155,125,160,0.15); color: var(--mauve); border: 1px solid rgba(155,125,160,0.25);
}
.tag.gold { background: rgba(212,168,83,0.15); color: var(--gold); border-color: rgba(212,168,83,0.25); }
.bar-right { display: flex; align-items: center; gap: 12px; }
.btn-visit {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 20px; border-radius: 8px;
  background: var(--mauve); color: #fff;
  text-decoration: none; font-size: 12px; font-weight: 500;
  letter-spacing: 0.04em; transition: all 0.3s;
}
.btn-visit:hover { background: var(--mauve-dark); transform: translateY(-1px); }
.btn-back {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 8px 16px; border-radius: 8px;
  background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.6);
  text-decoration: none; font-size: 12px; font-weight: 400;
  border: 1px solid rgba(255,255,255,0.08); transition: all 0.3s;
}
.btn-back:hover { background: rgba(255,255,255,0.1); color: #fff; }

/* IFRAME */
.site-frame {
  position: fixed; top: 62px; left: 0; right: 0; bottom: 0;
  border: none; width: 100%; height: calc(100vh - 62px);
}

/* MOBILE */
@media (max-width: 768px) {
  .showcase-bar { padding: 10px 16px; flex-wrap: wrap; gap: 8px; }
  .bar-tags { display: none; }
  .bar-info h2 { font-size: 13px; }
  .btn-visit { padding: 6px 14px; font-size: 11px; }
}
</style>
</head>
<body>

<div class="showcase-bar">
  <div class="bar-left">
    <div class="bar-logo">SB</div>
    <div class="bar-info">
      <h2>Studio Belleza Tahiti</h2>
      <p>Prothésiste ongulaire — Paea, Tahiti</p>
    </div>
    <div class="bar-tags">
      <span class="tag">Booking IA</span>
      <span class="tag">Chatbot Claude</span>
      <span class="tag gold">Dashboard Admin</span>
    </div>
  </div>
  <div class="bar-right">
    <a href="https://studio-belleza.vercel.app" target="_blank" class="btn-visit">
      Visiter le site
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg>
    </a>
    <a href="/offre-site-web.html" class="btn-back">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M5 12l7 7M5 12l7-7"/></svg>
      Retour
    </a>
  </div>
</div>

<iframe src="https://studio-belleza.vercel.app" class="site-frame" loading="eager" allow="clipboard-write" title="Studio Belleza Tahiti"></iframe>

</body>
</html>
