<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=480">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:480px;height:520px;overflow:hidden;font-family:'DM Sans',sans-serif;background:#FAFAFA;color:#0D2137}
@keyframes slowZoom{0%{transform:scale(1)}100%{transform:scale(1.12)}}
@keyframes fadeIn{0%{opacity:0;transform:translateY(6px)}100%{opacity:1;transform:translateY(0)}}
.hero{position:relative;width:480px;height:200px;overflow:hidden;overflow:hidden}
.hero-bg{width:100%;height:100%;background:url('../images/fare-nui-immo/hero.jpg') center/cover;animation:slowZoom 14s ease-in-out infinite alternate}
.hero-ov{position:absolute;inset:0;background:linear-gradient(135deg,rgba(13,33,55,0.8) 0%,rgba(13,33,55,0.45) 100%);display:flex;flex-direction:column;justify-content:flex-end;padding:14px 18px}
.hero .tag{font-size:8px;color:#2CCCD4;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px}
.hero h1{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;color:#fff}
.hero h1 span{color:#2CCCD4}
.hero p{font-size:9px;color:rgba(255,255,255,0.6);margin-top:2px}
.content{height:190px;overflow:hidden;padding:8px 12px;display:grid;grid-template-columns:1fr 1fr;gap:6px;animation:fadeIn .6s ease .2s both}
.prop{border-radius:5px;overflow:hidden;position:relative}
.prop img{width:100%;height:100%;object-fit:cover;display:block}
.prop-ov{position:absolute;inset:0;background:linear-gradient(0deg,rgba(13,33,55,0.75) 0%,transparent 55%)}
.prop-info{position:absolute;bottom:5px;left:6px}
.prop-info h4{font-family:'Space Grotesk',sans-serif;font-size:9px;color:#fff;font-weight:600}
.prop-info .price{font-size:8px;color:#2CCCD4;font-weight:500}
.cta{height:130px;overflow:hidden;background:#0D2137;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;animation:fadeIn .6s ease .4s both}
.cta h2{font-family:'Space Grotesk',sans-serif;font-size:14px;color:#fff;font-weight:600}
.cta h2 span{color:#2CCCD4}
.cta p{font-size:9px;color:rgba(255,255,255,0.5)}
.btn{display:inline-block;padding:7px 22px;background:#2CCCD4;color:#0D2137;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:10px;border-radius:5px;text-decoration:none}
</style>
</head>
<body>
<div class="hero">
  <div class="hero-bg"></div>
  <div class="hero-ov">
    <div class="tag">Immobilier Polynesie</div>
    <h1>Fare Nui <span>Immo</span></h1>
    <p>Villas, terrains et locaux en Polynesie</p>
  </div>
</div>
<div class="content">
  <div class="prop"><img src="../images/fare-nui-immo/villa-1.jpg" alt="Villa"><div class="prop-ov"></div><div class="prop-info"><h4>Villa Tipanier</h4><div class="price">85M XPF</div></div></div>
  <div class="prop"><img src="../images/fare-nui-immo/villa-2.jpg" alt="Penthouse"><div class="prop-ov"></div><div class="prop-info"><h4>Penthouse Fare Ute</h4><div class="price">62M XPF</div></div></div>
  <div class="prop"><img src="../images/fare-nui-immo/terrain.jpg" alt="Terrain"><div class="prop-ov"></div><div class="prop-info"><h4>Terrain Moorea</h4><div class="price">28M XPF</div></div></div>
  <div class="prop"><img src="../images/fare-nui-immo/bureau.jpg" alt="Bureau"><div class="prop-ov"></div><div class="prop-info"><h4>Bureau Centre-Ville</h4><div class="price">45M XPF</div></div></div>
</div>
<div class="cta">
  <h2>Trouvez votre <span>bien</span></h2>
  <p>350+ biens en ligne - 5 iles couvertes</p>
  <a href="#" class="btn">Trouvez Votre Bien</a>
</div>
</body>
</html>
