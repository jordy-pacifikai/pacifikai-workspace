<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=480">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Nunito:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:480px;height:520px;overflow:hidden;font-family:'Nunito',sans-serif;background:#FFF8F5;color:#6B3A5B}
@keyframes slowZoom{0%{transform:scale(1)}100%{transform:scale(1.12)}}
@keyframes fadeIn{0%{opacity:0;transform:translateY(6px)}100%{opacity:1;transform:translateY(0)}}
@keyframes breathe{0%,100%{transform:scale(1);opacity:.25}50%{transform:scale(1.12);opacity:.12}}
.hero{position:relative;width:480px;height:200px;overflow:hidden;overflow:hidden}
.hero-bg{width:100%;height:100%;background:url('../images/tiare-glow/hero.jpg') center/cover;animation:slowZoom 16s ease-in-out infinite alternate}
.hero-ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(107,58,91,0.25) 0%,rgba(107,58,91,0.55) 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.circle{position:absolute;border-radius:50%;border:1px solid rgba(183,110,121,0.25);top:50%;left:50%;transform:translate(-50%,-50%);animation:breathe 5s ease-in-out infinite}
.c1{width:80px;height:80px}
.c2{width:120px;height:120px;animation-delay:.8s}
.hero h1{font-family:'Playfair Display',serif;font-style:italic;font-size:22px;color:#fff;position:relative;z-index:1}
.hero p{font-size:9px;color:rgba(255,255,255,0.7);position:relative;z-index:1;margin-top:3px}
.content{height:190px;overflow:hidden;padding:8px 12px;display:grid;grid-template-columns:1fr 1fr;gap:6px;animation:fadeIn .6s ease .2s both}
.srv{border-radius:6px;overflow:hidden;position:relative}
.srv img{width:100%;height:100%;object-fit:cover;display:block}
.srv-ov{position:absolute;inset:0;background:linear-gradient(0deg,rgba(107,58,91,0.7) 0%,transparent 55%)}
.srv-info{position:absolute;bottom:5px;left:6px}
.srv-info h4{font-family:'Playfair Display',serif;font-style:italic;font-size:10px;color:#fff}
.srv-info p{font-size:7px;color:rgba(255,255,255,0.65)}
.cta{height:130px;overflow:hidden;background:linear-gradient(135deg,#B76E79,#C4828C);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;animation:fadeIn .6s ease .4s both}
.cta h2{font-family:'Playfair Display',serif;font-style:italic;font-size:15px;color:#fff}
.cta p{font-size:8.5px;color:rgba(255,255,255,0.75)}
.btn{display:inline-block;padding:7px 20px;background:#fff;color:#B76E79;font-weight:600;font-size:10px;border-radius:20px;text-decoration:none}
</style>
</head>
<body>
<div class="hero">
  <div class="hero-bg"></div>
  <div class="hero-ov">
    <div class="circle c1"></div>
    <div class="circle c2"></div>
    <h1>Tiare Glow</h1>
    <p>Beaute Naturelle &middot; Tahiti</p>
  </div>
</div>
<div class="content">
  <div class="srv"><img src="../images/tiare-glow/soins.jpg" alt="Soins"><div class="srv-ov"></div><div class="srv-info"><h4>Soin Visage</h4><p>Eclat & hydratation</p></div></div>
  <div class="srv"><img src="../images/tiare-glow/salon.jpg" alt="Salon"><div class="srv-ov"></div><div class="srv-info"><h4>Massage Taurumi</h4><p>Relaxation ancestrale</p></div></div>
  <div class="srv"><img src="../images/tiare-glow/nature.jpg" alt="Nature"><div class="srv-ov"></div><div class="srv-info"><h4>Rituel Monoi</h4><p>Soin corps complet</p></div></div>
  <div class="srv"><img src="../images/tiare-glow/detail.jpg" alt="Detail"><div class="srv-ov"></div><div class="srv-info"><h4>Gommage Coco</h4><p>Exfoliant naturel</p></div></div>
</div>
<div class="cta">
  <h2>Offrez-vous un moment</h2>
  <p>Laissez-vous transporter par la douceur polynesienne</p>
  <a href="#" class="btn">Prendre Rendez-vous</a>
</div>
</body>
</html>
