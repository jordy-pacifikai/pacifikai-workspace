<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=480">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:480px;height:520px;overflow:hidden;font-family:'Inter',sans-serif;background:#0A0A0F;color:#F8FAFC}
@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes fadeIn{0%{opacity:0;transform:translateY(6px)}100%{opacity:1;transform:translateY(0)}}
.hero{position:relative;width:480px;height:200px;overflow:hidden;overflow:hidden;display:flex;align-items:center;justify-content:center}
.hero-mesh{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(139,92,246,0.18) 0%,transparent 50%),radial-gradient(ellipse at 75% 30%,rgba(236,72,153,0.12) 0%,transparent 50%),radial-gradient(ellipse at 50% 85%,rgba(59,130,246,0.1) 0%,transparent 50%)}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(139,92,246,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(139,92,246,0.05) 1px,transparent 1px);background-size:40px 40px}
.hero-content{position:relative;z-index:1;text-align:center}
.hero-badge{display:inline-block;padding:3px 10px;background:rgba(139,92,246,0.12);border:1px solid rgba(139,92,246,0.3);border-radius:12px;font-size:7.5px;color:#8B5CF6;margin-bottom:8px}
.hero h1{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;background:linear-gradient(135deg,#F8FAFC 0%,#8B5CF6 50%,#EC4899 100%);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gradientShift 5s ease infinite}
.hero p{font-size:9px;color:rgba(248,250,252,0.45);margin-top:4px;max-width:260px;margin-left:auto;margin-right:auto}
.content{height:190px;overflow:hidden;padding:8px 14px;display:flex;flex-direction:column;align-items:center;gap:8px;animation:fadeIn .6s ease .2s both}
.dash-img{width:60%;border-radius:6px;overflow:hidden;border:1px solid rgba(139,92,246,0.2);box-shadow:0 4px 16px rgba(0,0,0,0.4)}
.dash-img img{width:100%;display:block}
.pills{display:flex;gap:5px;flex-wrap:wrap;justify-content:center}
.pill{padding:3px 9px;background:rgba(248,250,252,0.04);border:1px solid rgba(248,250,252,0.08);border-radius:10px;font-size:7.5px;color:rgba(248,250,252,0.55)}
.cta{height:130px;overflow:hidden;background:linear-gradient(135deg,#8B5CF6,#3B82F6);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;animation:fadeIn .6s ease .4s both}
.cta h2{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:#fff}
.cta p{font-size:8.5px;color:rgba(255,255,255,0.7)}
.btn{display:inline-block;padding:7px 20px;background:#fff;color:#7C3AED;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:10px;border-radius:6px;text-decoration:none}
</style>
</head>
<body>
<div class="hero">
  <div class="hero-mesh"></div>
  <div class="hero-grid"></div>
  <div class="hero-content">
    <div class="hero-badge">IA Generative integree</div>
    <h1>Aito Digital</h1>
    <p>La plateforme SaaS qui automatise vos workflows</p>
  </div>
</div>
<div class="content">
  <div class="dash-img"><img src="../images/aito-digital/dashboard.jpg" alt="Dashboard"></div>
  <div class="pills">
    <span class="pill">Workflows IA</span>
    <span class="pill">500+ Integrations</span>
    <span class="pill">Analytics</span>
    <span class="pill">SOC2</span>
    <span class="pill">Setup 5 min</span>
  </div>
</div>
<div class="cta">
  <h2>Pret a scaler ?</h2>
  <p>2 000+ entreprises font confiance a Aito Digital</p>
  <a href="#" class="btn">Demander une Demo</a>
</div>
</body>
</html>
