<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=480">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:480px;height:520px;overflow:hidden;font-family:'DM Sans',sans-serif;background:#0D0D0D;color:#FAFAFA}
@keyframes slowZoom{0%{transform:scale(1)}100%{transform:scale(1.12)}}
@keyframes fadeIn{0%{opacity:0;transform:translateY(6px)}100%{opacity:1;transform:translateY(0)}}
@keyframes neonPulse{0%,100%{text-shadow:0 0 10px rgba(170,255,0,0.4),0 0 20px rgba(170,255,0,0.2)}50%{text-shadow:0 0 20px rgba(170,255,0,0.7),0 0 40px rgba(170,255,0,0.3)}}
.hero{position:relative;width:480px;height:200px;overflow:hidden;overflow:hidden}
.hero-bg{width:100%;height:100%;background:url('../images/motu-fitness/hero.jpg') center/cover;animation:slowZoom 14s ease-in-out infinite alternate}
.hero-ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(13,13,13,0.3) 0%,rgba(13,13,13,0.82) 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.hero h1{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:5px;color:#FAFAFA;animation:neonPulse 3s ease-in-out infinite}
.hero p{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:#AAFF00;margin-top:4px}
.content{height:190px;overflow:hidden;padding:10px 14px;animation:fadeIn .6s ease .2s both}
.stats{display:flex;gap:6px;margin-bottom:8px}
.stat{flex:1;text-align:center;border:1px solid rgba(170,255,0,0.2);border-radius:4px;padding:6px 2px}
.stat .num{font-family:'Bebas Neue',sans-serif;font-size:18px;color:#AAFF00;line-height:1}
.stat .lbl{font-size:7px;color:rgba(250,250,250,0.45);text-transform:uppercase;letter-spacing:.5px;margin-top:1px}
.progs{display:flex;gap:6px}
.prog{flex:1;border:1px solid rgba(170,255,0,0.15);border-radius:4px;padding:7px 6px;text-align:center}
.prog h4{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:1px;color:#FAFAFA;margin-bottom:2px}
.prog p{font-size:7.5px;color:rgba(250,250,250,0.4);line-height:1.2}
.cta{height:130px;overflow:hidden;background:#AAFF00;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;animation:fadeIn .6s ease .4s both}
.cta h2{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:#0D0D0D}
.cta p{font-size:9px;color:rgba(13,13,13,0.6)}
.btn{display:inline-block;padding:7px 24px;background:#0D0D0D;color:#AAFF00;font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:2px;border-radius:3px;text-decoration:none}
</style>
</head>
<body>
<div class="hero">
  <div class="hero-bg"></div>
  <div class="hero-ov">
    <h1>MOTU FITNESS</h1>
    <p>Forge ton corps &middot; Libere ta force</p>
  </div>
</div>
<div class="content">
  <div class="stats">
    <div class="stat"><div class="num">500+</div><div class="lbl">Membres</div></div>
    <div class="stat"><div class="num">12</div><div class="lbl">Coachs</div></div>
    <div class="stat"><div class="num">35</div><div class="lbl">Cours/sem</div></div>
    <div class="stat"><div class="num">6j/7</div><div class="lbl">Ouvert</div></div>
  </div>
  <div class="progs">
    <div class="prog"><h4>STRENGTH</h4><p>Musculation & force pure</p></div>
    <div class="prog"><h4>CROSSFIT</h4><p>Haute intensite fonctionnelle</p></div>
  </div>
</div>
<div class="cta">
  <h2>PRET A COMMENCER ?</h2>
  <p>Premiere seance offerte</p>
  <a href="#" class="btn">ESSAI GRATUIT</a>
</div>
</body>
</html>
