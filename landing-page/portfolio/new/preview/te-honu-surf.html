<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=480">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Outfit:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:480px;height:520px;overflow:hidden;font-family:'Outfit',sans-serif;background:#F5E6D0;color:#1A2A3A}
@keyframes slowZoom{0%{transform:scale(1)}100%{transform:scale(1.12)}}
@keyframes fadeIn{0%{opacity:0;transform:translateY(6px)}100%{opacity:1;transform:translateY(0)}}
.hero{position:relative;width:480px;height:200px;overflow:hidden;overflow:hidden}
.hero-bg{width:100%;height:100%;background:url('../images/te-honu-surf/hero.jpg') center/cover;animation:slowZoom 14s ease-in-out infinite alternate}
.hero-ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(26,42,58,0.2) 0%,rgba(26,42,58,0.6) 75%,#F5E6D0 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding-bottom:14px}
.hero h1{font-family:'Sora',sans-serif;font-size:22px;font-weight:700;color:#fff}
.hero p{font-size:9px;color:#FF6B5A;letter-spacing:2px;text-transform:uppercase;margin-top:3px}
.wave-svg{position:absolute;bottom:0;left:0;width:100%}
.wave-svg svg{display:block;width:100%;height:16px}
.content{height:190px;overflow:hidden;padding:8px 12px;display:flex;gap:7px;animation:fadeIn .6s ease .2s both}
.course{flex:1;background:#fff;border-radius:8px;padding:10px 7px;text-align:center;box-shadow:0 2px 8px rgba(26,42,58,0.06);display:flex;flex-direction:column;align-items:center;gap:3px}
.course-icon{font-size:18px}
.course h3{font-family:'Sora',sans-serif;font-size:10px;font-weight:600}
.course p{font-size:7.5px;color:rgba(26,42,58,0.55);line-height:1.25}
.course .price{display:inline-block;margin-top:4px;padding:3px 8px;background:rgba(255,107,90,0.1);color:#FF6B5A;border-radius:10px;font-size:8px;font-weight:600}
.cta{position:relative;height:100px;overflow:hidden}
.cta-bg{width:100%;height:100%;background:url('../images/te-honu-surf/sunset.jpg') center/cover}
.cta-ov{position:absolute;inset:0;background:rgba(26,42,58,0.6);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;animation:fadeIn .6s ease .4s both}
.cta-ov h2{font-family:'Sora',sans-serif;font-size:14px;font-weight:700;color:#fff}
.cta-ov p{font-size:9px;color:rgba(255,255,255,0.65)}
.btn{display:inline-block;padding:7px 22px;background:#FF6B5A;color:#fff;font-family:'Sora',sans-serif;font-weight:600;font-size:10px;border-radius:20px;text-decoration:none}
</style>
</head>
<body>
<div class="hero">
  <div class="hero-bg"></div>
  <div class="hero-ov">
    <h1>TE HONU SURF</h1>
    <p>Ecole de Surf &middot; Tahiti</p>
  </div>
  <div class="wave-svg"><svg viewBox="0 0 380 16" preserveAspectRatio="none"><path d="M0,8 C63,0 127,16 190,8 C253,0 317,16 380,8 L380,16 L0,16 Z" fill="#F5E6D0"/></svg></div>
</div>
<div class="content">
  <div class="course"><span class="course-icon">&#127940;</span><h3>Decouverte</h3><p>Premiere glisse en securite</p><div class="price">5 500 XPF</div></div>
  <div class="course"><span class="course-icon">&#127754;</span><h3>Progression</h3><p>Manoeuvres & lecture de vague</p><div class="price">8 000 XPF</div></div>
  <div class="course"><span class="course-icon">&#127942;</span><h3>Perfectionnement</h3><p>Coaching intensif confirme</p><div class="price">12 000 XPF</div></div>
</div>
<div class="cta">
  <div class="cta-bg"></div>
  <div class="cta-ov">
    <h2>Pret a surfer ?</h2>
    <p>Les plus belles vagues de Polynesie</p>
    <a href="#" class="btn">Reserver</a>
  </div>
</div>
</body>
</html>
