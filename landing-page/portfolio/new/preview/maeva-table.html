<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=480">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:480px;height:520px;overflow:hidden;font-family:'Inter',sans-serif;background:#1A1A1A;color:#F2EDE4}
@keyframes slowZoom{0%{transform:scale(1)}100%{transform:scale(1.15)}}
@keyframes fadeIn{0%{opacity:0;transform:translateY(6px)}100%{opacity:1;transform:translateY(0)}}
.hero{position:relative;width:480px;height:200px;overflow:hidden;overflow:hidden}
.hero-bg{width:100%;height:100%;background:url('../images/maeva-table/hero.jpg') center/cover;animation:slowZoom 12s ease-in-out infinite alternate}
.hero-ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(26,26,26,0.2) 0%,rgba(26,26,26,0.75) 100%);display:flex;flex-direction:column;justify-content:flex-end;padding:14px 18px}
.hero h1{font-family:'Instrument Serif',serif;font-style:italic;font-size:22px;color:#F2EDE4}
.hero p{font-size:10px;color:#C9A84C;text-transform:uppercase;letter-spacing:2px;margin-top:2px}
.content{height:190px;overflow:hidden;padding:10px 14px;display:flex;gap:8px;animation:fadeIn .6s ease .2s both}
.card{flex:1;border:1px solid rgba(201,168,76,0.3);border-radius:5px;padding:8px 5px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:3px}
.card-icon{font-size:16px}
.card h3{font-size:10px;color:#C9A84C;font-weight:600;letter-spacing:.5px}
.card p{font-size:8.5px;line-height:1.25;color:rgba(242,237,228,0.6)}
.cta{position:relative;height:100px;overflow:hidden}
.cta-bg{width:100%;height:100%;background:url('../images/maeva-table/ambiance.jpg') center/cover}
.cta-ov{position:absolute;inset:0;background:rgba(26,26,26,0.72);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;animation:fadeIn .6s ease .4s both}
.cta-ov p{font-size:9px;color:rgba(242,237,228,0.6)}
.btn{display:inline-block;padding:7px 24px;border:1px solid #C9A84C;color:#C9A84C;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;border-radius:3px;text-decoration:none}
</style>
</head>
<body>
<div class="hero">
  <div class="hero-bg"></div>
  <div class="hero-ov">
    <h1>Maeva Table</h1>
    <p>Gastronomie Polynesienne</p>
  </div>
</div>
<div class="content">
  <div class="card"><span class="card-icon">&#127860;</span><h3>Entrees</h3><p>Poisson cru, tartare de thon, salade de cocotier</p></div>
  <div class="card"><span class="card-icon">&#127869;</span><h3>Plats</h3><p>Mahi mahi grille, cochon au four traditionnel</p></div>
  <div class="card"><span class="card-icon">&#127848;</span><h3>Desserts</h3><p>Po'e banane, panna cotta vanille de Tahiti</p></div>
</div>
<div class="cta">
  <div class="cta-bg"></div>
  <div class="cta-ov">
    <p>Ouvert du mardi au dimanche</p>
    <a href="#" class="btn">Reservez</a>
  </div>
</div>
</body>
</html>
