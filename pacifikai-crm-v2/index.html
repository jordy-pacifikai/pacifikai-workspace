<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="PACIFIK'AI CRM — Gestion prospects, campagnes, relances et projets" />
  <meta name="theme-color" content="#09090B" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PACIFIK'AI CRM" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="icon" href="favicon.png" />

  <title>PACIFIK'AI CRM</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/design-system.css" />

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
</head>
<body>

  <!-- ─── Mobile hamburger ──────────────────────────────────────────────── -->
  <button
    id="sidebar-toggle"
    class="sidebar-toggle"
    aria-label="Ouvrir le menu"
    aria-expanded="false"
    aria-controls="sidebar"
  >
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <line x1="3" y1="6"  x2="21" y2="6" />
      <line x1="3" y1="12" x2="21" y2="12" />
      <line x1="3" y1="18" x2="21" y2="18" />
    </svg>
  </button>

  <!-- ─── Mobile sidebar backdrop ──────────────────────────────────────── -->
  <div id="sidebar-backdrop" class="sidebar-backdrop" aria-hidden="true"></div>

  <!-- ─── App shell ─────────────────────────────────────────────────────── -->
  <div class="app-shell">

    <!-- ── Sidebar ──────────────────────────────────────────────────────── -->
    <aside id="sidebar" class="sidebar" role="navigation" aria-label="Navigation principale">

      <!-- Logo -->
      <div class="sidebar-logo" aria-label="PACIFIK'AI CRM">
        <img src="logo.png" alt="PACIFIK'AI" class="sidebar-logo-img" />
        <span class="sidebar-logo-text">CRM <span class="sidebar-logo-version">v2</span></span>
      </div>

      <!-- Nav -->
      <nav class="sidebar-nav" aria-label="Menu principal">
        <ul class="sidebar-nav-list" role="list">

          <li>
            <button class="nav-item active" data-view="dashboard" aria-current="page">
              <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
              <span>Dashboard</span>
            </button>
          </li>

          <li>
            <button class="nav-item" data-view="prospects">
              <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
              <span>Prospects</span>
            </button>
          </li>

          <li>
            <button class="nav-item" data-view="campaigns">
              <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></svg>
              <span>Campagnes</span>
              <span class="nav-badge nav-badge--new">NEW</span>
            </button>
          </li>

          <li>
            <button class="nav-item" data-view="tasks">
              <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
              <span>Tâches</span>
            </button>
          </li>

          <li>
            <button class="nav-item" data-view="relances">
              <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              <span>Relances</span>
              <span class="nav-badge nav-badge--new">NEW</span>
            </button>
          </li>

          <li>
            <button class="nav-item" data-view="messages">
              <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              <span>Messages</span>
            </button>
          </li>

          <li class="nav-separator" role="separator" aria-hidden="true"></li>

          <li>
            <button class="nav-item" data-view="analytics">
              <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6"  y1="20" x2="6"  y2="14"/></svg>
              <span>Analytics</span>
            </button>
          </li>

          <li>
            <button class="nav-item" data-view="finance">
              <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
              <span>Finance</span>
            </button>
          </li>

          <li>
            <button class="nav-item" data-view="blog">
              <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
              <span>Blog</span>
            </button>
          </li>

          <li>
            <button class="nav-item" data-view="newsletter">
              <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              <span>Newsletter</span>
            </button>
          </li>

          <li>
            <button class="nav-item" data-view="veille">
              <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <span>Veille</span>
            </button>
          </li>

          <li class="nav-separator" role="separator" aria-hidden="true"></li>

          <li>
            <button class="nav-item" data-view="projects">
              <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
              <span>Projets</span>
            </button>
          </li>

          <li>
            <button class="nav-item" data-view="client-files">
              <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
              <span>Fiches Clients</span>
            </button>
          </li>

          <li>
            <button class="nav-item" data-view="ia-tools">
              <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
              <span>Outils IA</span>
            </button>
          </li>

        </ul>
      </nav>

      <!-- Sidebar footer -->
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-user-avatar" aria-hidden="true">JT</div>
          <div class="sidebar-user-info">
            <span class="sidebar-user-name">Jordy Toofa</span>
            <span class="sidebar-user-role">Admin</span>
          </div>
          <button class="sidebar-settings-btn" aria-label="Paramètres">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
        </div>
        <button class="sidebar-logout-btn" aria-label="Se déconnecter">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          <span>Déconnexion</span>
        </button>
      </div>

    </aside>

    <!-- ── Main wrapper ──────────────────────────────────────────────────── -->
    <div class="main-wrapper">

      <!-- ── Header ─────────────────────────────────────────────────────── -->
      <header class="app-header" role="banner">
        <div class="header-left">
          <h1 class="header-title" id="header-title">Dashboard</h1>
          <nav class="header-breadcrumb" aria-label="Fil d'ariane" id="header-breadcrumb"></nav>
        </div>

        <div class="header-center">
          <button class="header-search" id="search-trigger" aria-label="Rechercher (Cmd+K)" aria-keyshortcuts="Meta+k">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <span class="header-search-placeholder">Rechercher...</span>
            <kbd class="header-search-kbd" aria-hidden="true">⌘K</kbd>
          </button>
        </div>

        <div class="header-right">
          <button class="header-btn" id="theme-toggle" aria-label="Basculer le thème">
            <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>

          <button class="header-btn header-notifications" id="notifications-btn" aria-label="Notifications" aria-haspopup="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span class="notif-badge" id="notif-count" aria-label="3 notifications" style="display:none">0</span>
          </button>

          <button class="header-avatar" id="header-user-menu" aria-label="Menu utilisateur" aria-haspopup="true">
            <span aria-hidden="true">JT</span>
          </button>
        </div>
      </header>

      <!-- ── Content area ────────────────────────────────────────────────── -->
      <main class="content-area" id="content-area" role="main">

        <section class="view active" id="view-dashboard" aria-label="Dashboard"></section>

        <section class="view" id="view-prospects" aria-label="Prospects" style="display:none">
          <div class="view-toolbar" role="toolbar" aria-label="Options prospects">
            <div class="toolbar-left">
              <div class="view-toggle" role="group" aria-label="Mode d'affichage">
                <button class="view-toggle-btn active" data-mode="table" aria-pressed="true" aria-label="Vue tableau">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg>
                </button>
                <button class="view-toggle-btn" data-mode="kanban" aria-pressed="false" aria-label="Vue kanban">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="5" height="18" rx="1"/><rect x="10" y="3" width="5" height="13" rx="1"/><rect x="17" y="3" width="5" height="16" rx="1"/></svg>
                </button>
                <button class="view-toggle-btn" data-mode="grid" aria-pressed="false" aria-label="Vue grille">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                </button>
              </div>
              <button class="btn-filter" id="prospects-filter-btn" aria-label="Filtres" aria-haspopup="true">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
                Filtres
              </button>
            </div>
            <div class="toolbar-right">
              <div class="toolbar-search">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="search" id="prospects-search" placeholder="Rechercher un prospect..." aria-label="Rechercher un prospect" />
              </div>
              <button class="btn-primary" id="new-prospect-btn" aria-label="Nouveau prospect">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Nouveau
              </button>
            </div>
          </div>
          <div id="prospects-content"></div>
        </section>

        <section class="view" id="view-campaigns" aria-label="Campagnes" style="display:none"></section>

        <section class="view" id="view-tasks" aria-label="Tâches" style="display:none">
          <div class="view-toolbar" role="toolbar" aria-label="Options tâches">
            <div class="toolbar-left">
              <div class="view-toggle" role="group" aria-label="Mode d'affichage">
                <button class="view-toggle-btn active" data-mode="kanban" aria-pressed="true" aria-label="Vue kanban">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="5" height="18" rx="1"/><rect x="10" y="3" width="5" height="13" rx="1"/><rect x="17" y="3" width="5" height="16" rx="1"/></svg>
                </button>
                <button class="view-toggle-btn" data-mode="list" aria-pressed="false" aria-label="Vue liste">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                </button>
              </div>
              <button class="btn-filter" id="tasks-filter-btn" aria-label="Filtres" aria-haspopup="true">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
                Filtres
              </button>
            </div>
            <div class="toolbar-right">
              <button class="btn-primary" id="new-task-btn" aria-label="Nouvelle tâche">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Nouvelle tâche
              </button>
            </div>
          </div>
          <div id="tasks-content"></div>
        </section>

        <section class="view" id="view-relances"      aria-label="Relances"       style="display:none"></section>
        <section class="view" id="view-messages"      aria-label="Messages"       style="display:none"></section>
        <section class="view" id="view-analytics"     aria-label="Analytics"      style="display:none"></section>
        <section class="view" id="view-finance"       aria-label="Finance"        style="display:none"></section>
        <section class="view" id="view-blog"          aria-label="Blog"           style="display:none"></section>
        <section class="view" id="view-newsletter"    aria-label="Newsletter"     style="display:none"></section>
        <section class="view" id="view-veille"        aria-label="Veille"         style="display:none"></section>
        <section class="view" id="view-projects"      aria-label="Projets"        style="display:none"></section>
        <section class="view" id="view-client-files"  aria-label="Fiches Clients" style="display:none"></section>
        <section class="view" id="view-ia-tools"      aria-label="Outils IA"      style="display:none"></section>

      </main>
    </div>
  </div>

  <!-- ─── Slide Panel ───────────────────────────────────────────────────── -->
  <div id="slide-panel-backdrop" class="slide-panel-backdrop" aria-hidden="true"></div>
  <aside
    id="slide-panel"
    class="slide-panel"
    role="complementary"
    aria-label="Panneau détail"
    aria-hidden="true"
    tabindex="-1"
  >
    <div class="slide-panel-header">
      <h2 class="slide-panel-title" id="slide-panel-title"></h2>
      <button class="slide-panel-close" id="slide-panel-close" aria-label="Fermer le panneau">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="slide-panel-body" id="slide-panel-body"></div>
  </aside>

  <!-- ─── Confirm Dialog ────────────────────────────────────────────────── -->
  <div
    id="confirm-dialog-overlay"
    class="dialog-overlay"
    role="dialog"
    aria-modal="true"
    aria-labelledby="confirm-dialog-title"
    aria-hidden="true"
  >
    <div class="dialog-box">
      <h3 class="dialog-title" id="confirm-dialog-title"></h3>
      <p class="dialog-message" id="confirm-dialog-message"></p>
      <div class="dialog-actions">
        <button class="btn-secondary" id="confirm-dialog-cancel">Annuler</button>
        <button class="btn-danger"    id="confirm-dialog-confirm">Confirmer</button>
      </div>
    </div>
  </div>

  <!-- ─── Toast Container ───────────────────────────────────────────────── -->
  <div
    id="toast-container"
    class="toast-container"
    role="region"
    aria-label="Notifications"
    aria-live="polite"
    aria-atomic="false"
  ></div>

  <!-- ─── Context Menu ──────────────────────────────────────────────────── -->
  <nav
    id="context-menu"
    class="context-menu"
    role="menu"
    aria-label="Menu contextuel"
    aria-hidden="true"
  ></nav>

  <!-- ─── Cmd+K Search Modal ────────────────────────────────────────────── -->
  <div
    id="search-modal"
    class="search-modal-overlay"
    role="dialog"
    aria-modal="true"
    aria-label="Recherche rapide"
    aria-hidden="true"
  >
    <div class="search-modal-box">
      <div class="search-modal-input-wrap">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input
          type="search"
          id="search-modal-input"
          class="search-modal-input"
          placeholder="Rechercher un prospect, une tâche, un projet..."
          autocomplete="off"
          aria-autocomplete="list"
          aria-controls="search-modal-results"
        />
        <kbd class="search-modal-esc" aria-label="Echap pour fermer">ESC</kbd>
      </div>
      <div id="search-modal-results" class="search-modal-results" role="listbox" aria-label="Résultats de recherche"></div>
    </div>
  </div>

  <!-- ─── Scripts ───────────────────────────────────────────────────────── -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script src="js/state.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/router.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/prospects.js"></script>
  <script src="js/campaigns.js"></script>
  <script src="js/tasks.js"></script>
  <script src="js/relances.js"></script>
  <script src="js/messages.js"></script>
  <script src="js/analytics.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
