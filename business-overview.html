<!DOCTYPE html>
<html lang="fr">
<head>

<title>PACIFIK'AI — Business Overview</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --void:#050506;--card:#0d0d0f;--card2:#13131f;--card3:#1a1025;
  --primary:#6366f1;--primary-light:#818cf8;--primary-dark:#4f46e5;
  --accent:#10b981;
  --ivory:#f8f6f2;--text:#b0b0c8;--text-dim:#6b7280;--border:#1a1a2e;
  --green:#10b981;--red:#ef4444;--blue:#3b82f6;--orange:#f59e0b;
}
body{background:var(--void);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;line-height:1.6;overflow-x:hidden}
h1,h2,h3,h4{color:var(--ivory);font-weight:700}
a{color:var(--primary-light);text-decoration:none}
a:hover{text-decoration:underline}
code{background:rgba(168,85,247,.1);padding:2px 8px;border-radius:4px;font-size:13px;color:var(--primary-light)}

.tab-nav{position:sticky;top:0;z-index:100;background:rgba(5,5,6,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 20px;display:flex;gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-nav::-webkit-scrollbar{height:0}
.tab-btn{padding:14px 20px;font-size:13px;font-weight:600;color:var(--text-dim);border:none;background:none;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s}
.tab-btn:hover{color:var(--ivory)}
.tab-btn.active{color:var(--primary-light);border-bottom-color:var(--primary)}
.tab-page{display:none;padding:40px 20px;max-width:1200px;margin:0 auto}
.tab-page.active{display:block}

.hero{text-align:center;padding:60px 20px 40px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-100px;right:-100px;width:400px;height:400px;background:radial-gradient(circle,color-mix(in srgb, var(--primary) 8%, transparent),transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:-50px;left:-50px;width:300px;height:300px;background:radial-gradient(circle,color-mix(in srgb, var(--accent) 5%, transparent),transparent 70%);pointer-events:none}
.hero h1{font-size:clamp(28px,5vw,48px);background:linear-gradient(135deg,var(--primary-light),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px;position:relative}
.hero p{font-size:18px;color:var(--text);max-width:700px;margin:0 auto 30px}
.badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.badge-live{background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.3)}
.badge-primary{background:color-mix(in srgb, var(--primary) 12%, transparent);color:var(--primary-light);border:1px solid color-mix(in srgb, var(--primary) 25%, transparent)}

.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:16px;margin:30px auto;max-width:900px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px 16px;text-align:center}
.stat-card .val{font-size:28px;font-weight:800;background:linear-gradient(135deg,var(--primary-light),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-card .label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;margin-top:4px}

.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:28px;margin-bottom:20px}
.card-accent{border-left:3px solid var(--primary)}
.card h3{font-size:16px;margin-bottom:12px}
.card h4{font-size:14px;color:var(--primary-light);margin-bottom:8px}

.section{margin-bottom:40px}
.section-title{font-size:20px;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.section-icon{width:32px;height:32px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;font-size:16px}
.icon-primary{background:color-mix(in srgb, var(--primary) 15%, transparent);color:var(--primary-light)}
.icon-accent{background:color-mix(in srgb, var(--accent) 15%, transparent);color:var(--accent)}
.icon-green{background:rgba(16,185,129,.12);color:var(--green)}

table{width:100%;border-collapse:collapse;margin:16px 0;font-size:14px}
th{text-align:left;padding:10px 14px;background:var(--card2);color:var(--ivory);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border)}
td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text)}
tr:hover td{background:rgba(168,85,247,.03)}

.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin:16px 0}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin:16px 0}

ul.check-list{list-style:none;padding:0}
ul.check-list li{padding:6px 0;display:flex;align-items:flex-start;gap:8px;font-size:14px}
ul.check-list li::before{content:'';width:18px;height:18px;border-radius:4px;border:1px solid var(--border);flex-shrink:0;margin-top:2px}
ul.check-list li.done::before{background:var(--green);border-color:var(--green);content:'✓';color:white;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
ul.check-list li.done{color:var(--text-dim);text-decoration:line-through}

ul.bullet-list{list-style:none;padding:0}
ul.bullet-list li{padding:5px 0;padding-left:20px;position:relative;font-size:14px}
ul.bullet-list li::before{content:'';position:absolute;left:4px;top:13px;width:6px;height:6px;border-radius:50%;background:var(--primary)}

.flow-row{display:flex;align-items:center;gap:0;flex-wrap:wrap;margin:16px 0}
.flow-step{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px 16px;font-size:13px;font-weight:600;color:var(--ivory);white-space:nowrap}
.flow-arrow{color:var(--primary);font-size:18px;padding:0 6px}

.tl-item{padding:16px 0 16px 24px;border-left:2px solid var(--border);position:relative;margin-left:8px}
.tl-item::before{content:'';position:absolute;left:-6px;top:20px;width:10px;height:10px;border-radius:50%;background:var(--primary);border:2px solid var(--void)}
.tl-item.done::before{background:var(--green)}
.tl-item h4{font-size:14px;color:var(--primary-light);margin-bottom:4px}
.tl-item p{font-size:13px;color:var(--text)}

.tag{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:600;margin:2px}
.tag-green{background:rgba(16,185,129,.12);color:var(--green)}
.tag-orange{background:rgba(245,158,11,.12);color:var(--orange)}
.tag-red{background:rgba(239,68,68,.12);color:var(--red)}
.tag-blue{background:rgba(59,130,246,.12);color:var(--blue)}
.tag-primary{background:color-mix(in srgb, var(--primary) 12%, transparent);color:var(--primary-light)}

.empty-state{text-align:center;padding:60px 20px;color:var(--text-dim)}
.empty-state p{font-size:14px}

.footer{text-align:center;padding:40px 20px;font-size:12px;color:var(--text-dim);border-top:1px solid var(--border);margin-top:60px}

@media(max-width:768px){
  .grid-2,.grid-3{grid-template-columns:1fr}
  .tab-btn{padding:12px 14px;font-size:12px}
  .flow-row{flex-direction:column;align-items:stretch}
  .flow-arrow{transform:rotate(90deg);text-align:center}
  .stats-row{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>

(function(){
  const D = window.__OVERVIEW_DATA__;
  if (!D) return;

  // Hero
  const badges = document.getElementById('badges');
  badges.innerHTML = `<span class="badge badge-live">ACTIF</span>` +
    (D.url ? ` <span class="badge badge-primary">${esc(D.url)}</span>` : '');

  document.getElementById('projectName').textContent = D.projectName || 'Projet';
  document.getElementById('projectDesc').textContent = D.description || '';
  document.getElementById('meta').textContent =
    `Business Overview — ${D.generatedDate || 'N/A'} — PACIFIK'AI`;

  // Stats
  const sr = document.getElementById('statsRow');
  if (D.stats && D.stats.length) {
    sr.innerHTML = D.stats.map(s =>
      `<div class="stat-card"><div class="val">${esc(s.value)}</div><div class="label">${esc(s.label)}</div></div>`
    ).join('');
  } else {
    sr.style.display = 'none';
  }

  // Tabs
  const nav = document.getElementById('tabNav');
  const pages = document.getElementById('tabPages');

  if (!D.tabs || !D.tabs.length) {
    pages.innerHTML = '<div class="empty-state"><p>Aucune donnee disponible. Mettez a jour le MEMORY.md du projet.</p></div>';
    return;
  }

  D.tabs.forEach(function(tab, i) {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
    btn.dataset.tab = tab.id;
    btn.textContent = tab.label;
    nav.appendChild(btn);

    const page = document.createElement('div');
    page.className = 'tab-page' + (i === 0 ? ' active' : '');
    page.id = tab.id;
    page.innerHTML = renderTab(tab);
    pages.appendChild(page);
  });

  nav.addEventListener('click', function(e) {
    const btn = e.target.closest('.tab-btn');
    if (!btn) return;
    nav.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
    pages.querySelectorAll('.tab-page').forEach(function(p){ p.classList.remove('active'); });
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab).classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  // Footer
  document.getElementById('footer').innerHTML =
    `${esc(D.projectName)} — Business Overview — Document interne<br>` +
    `Genere le ${esc(D.generatedDate || '')} — PACIFIK'AI`;

  // Renderers
  function renderTab(tab) {
    if (!tab.sections || !tab.sections.length) {
      return '<div class="empty-state"><p>Aucun contenu pour cet onglet.</p></div>';
    }
    return tab.sections.map(function(s) { return renderSection(s); }).join('');
  }

  function renderSection(s) {
    var icons = ['&#9670;','&#9733;','&#9881;','&#10003;','&#9654;','&#9672;','&#8634;','&#9733;'];
    var icon = icons[Math.abs(hashCode(s.heading)) % icons.length];
    var html = '<div class="section">';
    html += '<h2 class="section-title"><span class="section-icon icon-primary">' + icon + '</span> ' + esc(s.heading) + '</h2>';

    // Key-values as card grid
    if (s.keyValues && s.keyValues.length) {
      html += '<div class="grid-2">';
      s.keyValues.forEach(function(kv) {
        html += '<div class="card"><h4>' + esc(kv.key) + '</h4><p>' + escLink(kv.value) + '</p></div>';
      });
      html += '</div>';
    }

    // Tables
    if (s.tables) {
      s.tables.forEach(function(t) { html += renderTable(t); });
    }

    // Lists
    if (s.lists) {
      s.lists.forEach(function(l) { html += renderList(l); });
    }

    // Code blocks
    if (s.codeBlocks) {
      s.codeBlocks.forEach(function(c) {
        html += '<div class="card" style="font-family:monospace;font-size:13px;white-space:pre-wrap;overflow-x:auto">' + esc(c) + '</div>';
      });
    }

    // Paragraphs
    if (s.paragraphs) {
      s.paragraphs.forEach(function(p) {
        html += '<div class="card card-accent"><p>' + escLink(p) + '</p></div>';
      });
    }

    html += '</div>';
    return html;
  }

  function renderTable(t) {
    if (!t.headers || !t.rows || !t.rows.length) return '';
    var html = '<div class="card"><table><thead><tr>';
    t.headers.forEach(function(h) { html += '<th>' + esc(h) + '</th>'; });
    html += '</tr></thead><tbody>';
    t.rows.forEach(function(row) {
      html += '<tr>';
      row.forEach(function(cell) { html += '<td>' + escLink(cell) + '</td>'; });
      html += '</tr>';
    });
    html += '</tbody></table></div>';
    return html;
  }

  function renderList(l) {
    if (!l.items || !l.items.length) return '';
    var isCheck = l.items.some(function(it) { return it.checked !== undefined; });
    var cls = isCheck ? 'check-list' : 'bullet-list';
    var html = '<div class="card"><ul class="' + cls + '">';
    l.items.forEach(function(it) {
      var c = isCheck ? (it.checked ? ' class="done"' : '') : '';
      html += '<li' + c + '>' + escLink(it.text) + '</li>';
    });
    html += '</ul></div>';
    return html;
  }

  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function escLink(s) {
    if (!s) return '';
    s = esc(s);
    // Auto-link URLs
    s = s.replace(/(https?:\/\/[^\s<"]+)/g, '<a href="$1" target="_blank">$1</a>');
    // Inline code
    s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
    // Bold
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong style="color:var(--ivory)">$1</strong>');
    return s;
  }

  function hashCode(s) {
    var h = 0;
    for (var i = 0; i < s.length; i++) {
      h = ((h << 5) - h + s.charCodeAt(i)) | 0;
    }
    return h;
  }
})();
</script>
</body>
</html>
