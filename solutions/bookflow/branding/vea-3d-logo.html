<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ve'a — Logo 3D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #080c14; overflow: hidden; font-family: -apple-system, sans-serif; }
  canvas { display: block; }
  #info {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    color: rgba(196,208,228,0.4); font-size: 11px; letter-spacing: 0.1em;
    text-transform: uppercase; pointer-events: none; z-index: 10;
  }
  #brand {
    position: fixed; top: 32px; left: 50%; transform: translateX(-50%);
    color: #f0f2f8; font-size: 42px; font-weight: 300; letter-spacing: 0.12em;
    z-index: 10; pointer-events: none; opacity: 0.9;
    text-shadow: 0 0 40px rgba(20,184,166,0.3);
  }
</style>
</head>
<body>

<div id="brand">Ve'a</div>
<div id="info">Déplacez la souris pour interagir</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// ============ SCENE — same setup as PACIFIK'AI HeroWithLogo ============
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 0, 4.5);

const renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.6;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// Post-processing — same as PACIFIK'AI
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
composer.addPass(new UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight), 0.6, 0.9, 1.0
));

// ============ LIGHTING — brighter for the bird ============
scene.add(new THREE.AmbientLight(0xc4d0e4, 0.6));
const dir1 = new THREE.DirectionalLight(0xffffff, 2.0);
dir1.position.set(5, 5, 5);
scene.add(dir1);
const dir2 = new THREE.DirectionalLight(0xe0e7ff, 0.8);
dir2.position.set(-3, 2, -2);
scene.add(dir2);
const dir3 = new THREE.DirectionalLight(0xffffff, 0.6);
dir3.position.set(0, -3, 4);
scene.add(dir3);
const pt1 = new THREE.PointLight(0x14b8a6, 0.8, 12);
pt1.position.set(2, 1, 3);
scene.add(pt1);
const pt2 = new THREE.PointLight(0x10b981, 0.6, 10);
pt2.position.set(-2, -1, 2);
scene.add(pt2);

// Environment — city preset equivalent
const pmrem = new THREE.PMREMGenerator(renderer);
const envScene = new THREE.Scene();
envScene.add(new THREE.AmbientLight(0xffffff, 0.8));
[0xffeedd, 0xddddff, 0xffffff, 0xc4d0e4, 0xe0e7ff, 0xf0f2f8].forEach((c, i) => {
  const m = new THREE.Mesh(
    new THREE.SphereGeometry(1, 8, 8),
    new THREE.MeshBasicMaterial({ color: c })
  );
  m.position.set(Math.cos(i) * 8, Math.sin(i * 1.5) * 4, Math.cos(i * 0.8) * 6);
  envScene.add(m);
});
const envMap = pmrem.fromScene(envScene, 0, 0.1, 100).texture;
scene.environment = envMap;

// ============ LOAD LOGO — same pattern as Logo3D.tsx ============
const ACCENT = new THREE.Color(0x14b8a6);
const logoGroup = new THREE.Group();
const floatGroup = new THREE.Group();
logoGroup.add(floatGroup);
scene.add(logoGroup);

const draco = new DRACOLoader();
draco.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/libs/draco/');
const loader = new GLTFLoader();
loader.setDRACOLoader(draco);

loader.load('vea-logo-3d-final.glb', (gltf) => {
  const model = gltf.scene;

  // Upgrade materials — cutout paths don't overlap, no z-fighting
  model.traverse((child) => {
    if (!child.isMesh) return;
    const oldMat = child.material;
    const color = oldMat.color?.clone() || new THREE.Color(0xcccccc);

    child.material = new THREE.MeshPhysicalMaterial({
      color,
      metalness: 0.6,
      roughness: 0.12,
      clearcoat: 0.9,
      clearcoatRoughness: 0.08,
      emissive: ACCENT,
      emissiveIntensity: 0.12,
      envMapIntensity: 2.0,
      side: THREE.DoubleSide,
    });
  });

  // Wrap in a pivot group to handle centering cleanly
  const pivot = new THREE.Group();
  pivot.add(model);

  // Scale first
  const box = new THREE.Box3().setFromObject(pivot);
  const sz = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(sz.x, sz.y, sz.z);
  const targetSize = 2.8;
  pivot.scale.multiplyScalar(targetSize / maxDim);

  // Then re-center after scale
  const box2 = new THREE.Box3().setFromObject(pivot);
  const center2 = box2.getCenter(new THREE.Vector3());
  pivot.position.sub(center2);

  floatGroup.add(pivot);
});

// ============ RINGS — same as HeroWithLogo ============
function makeRing(radius, thickness, color, opacity) {
  const mesh = new THREE.Mesh(
    new THREE.TorusGeometry(radius, thickness, 16, 100),
    new THREE.MeshStandardMaterial({
      color, transparent: true, opacity,
      emissive: color, emissiveIntensity: 0.4, toneMapped: false,
    })
  );
  scene.add(mesh);
  return mesh;
}
const ring1 = makeRing(1.6, 0.008, 0x14b8a6, 0.25);
const ring2 = makeRing(2.0, 0.006, 0x10b981, 0.18);

// ============ PARTICLES — same as HeroWithLogo ============
const N = 150;
const positions = new Float32Array(N * 3);
for (let i = 0; i < N; i++) {
  positions[i*3] = (Math.random()-0.5)*12;
  positions[i*3+1] = (Math.random()-0.5)*8;
  positions[i*3+2] = (Math.random()-0.5)*6;
}
const pGeo = new THREE.BufferGeometry();
pGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const particles = new THREE.Points(pGeo, new THREE.PointsMaterial({
  size: 0.02, color: 0x14b8a6, transparent: true, opacity: 0.3,
  sizeAttenuation: true, depthWrite: false, blending: THREE.AdditiveBlending,
}));
scene.add(particles);

// ============ INTERACTION ============
const mouse = { x: 0, y: 0 };
document.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / innerWidth - 0.5) * 2;
  mouse.y = (e.clientY / innerHeight - 0.5) * 2;
});

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});

// ============ ANIMATE — same pattern as HeroWithLogo ============
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Slow rotation — same as Logo component
  logoGroup.rotation.y = t * 0.15;

  // Mouse parallax — same as Logo component
  logoGroup.rotation.x = THREE.MathUtils.lerp(
    logoGroup.rotation.x, -mouse.y * 0.1, 0.03
  );
  logoGroup.rotation.z = THREE.MathUtils.lerp(
    logoGroup.rotation.z, mouse.x * 0.05, 0.03
  );

  // Subtle float — same as Logo component
  floatGroup.position.y = Math.sin(t * 0.8) * 0.05;

  // Rings
  ring1.rotation.x = t * 0.18;
  ring1.rotation.z = t * 0.06;
  ring2.rotation.y = t * 0.12;
  ring2.rotation.x = Math.PI / 3 + t * 0.08;

  // Particles drift
  const pos = particles.geometry.attributes.position.array;
  for (let i = 0; i < pos.length; i++) {
    pos[i] += (Math.random() - 0.5) * 0.002;
    if (pos[i] > 6) pos[i] = -6;
    if (pos[i] < -6) pos[i] = 6;
  }
  particles.geometry.attributes.position.needsUpdate = true;

  composer.render();
}

animate();
</script>
</body>
</html>
